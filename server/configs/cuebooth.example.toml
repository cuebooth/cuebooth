# CueBooth server configuration — example
#
# Copy to cuebooth.toml and adjust for your deployment. This file documents the
# schema. For a fully worked, end-to-end deployment see docs/sample-deployment.md §6.

[server]
# Address the WebSocket API binds to. Use 0.0.0.0 to accept connections
# from any interface (LAN, Tailscale). Use 127.0.0.1 for local-only.
listen = "0.0.0.0:7878"

[companion]
# Bitfocus Companion's HTTP API. Typically localhost since Companion
# runs on the same production PC.
base_url = "http://localhost:8000"

# The Companion Satellite surface the server registers so clients render
# Companion's own buttons natively (auto-discovered — no client-side button
# definitions). The server connects to Companion's Satellite API (TCP) and
# relays each button's rendered bitmap to clients; presses route back.
# See docs/protocol.md §10. Defaults shown; omit the section to accept them.
[companion.satellite]
addr = "localhost:16622" # Companion satellite endpoint; "off" to disable the surface
device_id = "cuebooth"   # stable surface id (Companion keys per-surface settings by it)
rows = 4                 # grid dimensions (default 4×8 — a Stream Deck XL layout)
cols = 8
bitmap_size = 72         # button bitmap edge length in pixels (square)

# ─────────────────────────────────────────────────────────────────────────
# Presets
#
# Map the logical names used in slide rules and by the client to a concrete
# action: either a Companion button to press, or a direct OSC command. Set
# exactly one routing per preset — companion_button OR (osc_command + osc_value).
#
# A companion_button is a "page/row/column" coordinate (page is 1-based; row and
# column are 0-based), matching Companion's HTTP API location path.

# ─── Camera presets (namespaced by camera id: [presets.camera.<id>.<name>]) ──
[presets.camera.main.choir]
companion_button = "1/3/2"

[presets.camera.main.podium]
companion_button = "1/1/1"

# ─── OBS scene presets ──────────────────────────────────────────────────────
[presets.scene.camera-only]
companion_button = "7/0/1" # OBS scene: "Just Camera"

[presets.scene.camera-with-slides]
companion_button = "7/0/2" # OBS scene: "Camera + Slides"

# ─── Audio mute / unmute presets ────────────────────────────────────────────
# Discrete mute toggles can route through Companion (pre-wired buttons) or
# direct OSC — both work; mix as convenient.
[presets.audio.mute.non-choir]
companion_button = "4/1/1"

[presets.audio.unmute.non-choir]
companion_button = "4/2/1"

[presets.audio.mute.podium]
osc_command = "/ch/04/mix/on"
osc_value = 0

[presets.audio.unmute.podium]
osc_command = "/ch/04/mix/on"
osc_value = 1

# ─── Stream / recording / slide control ─────────────────────────────────────
# Verb-keyed presets. Allowed verbs: streaming/recording = start, stop;
# slides = next, prev.
[presets.streaming.start]
companion_button = "8/0/0"

[presets.streaming.stop]
companion_button = "8/0/1"

[presets.recording.start]
companion_button = "8/1/0"

[presets.recording.stop]
companion_button = "8/1/1"

[presets.slides.next]
companion_button = "7/3/6"

[presets.slides.prev]
companion_button = "7/3/5"

