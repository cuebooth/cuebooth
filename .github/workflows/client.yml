name: client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'

# Least privilege: these are pure build/test jobs.
permissions:
  contents: read

# Cancel superseded runs on the same ref — but only for PRs, so back-to-back
# pushes to main each keep their own CI record.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: client

jobs:
  analyze-test:
    name: analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        run: flutter pub get
      - name: flutter analyze
        run: flutter analyze
      - name: flutter test
        run: flutter test
