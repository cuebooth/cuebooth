name: client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'

defaults:
  run:
    working-directory: client

jobs:
  analyze-test:
    name: analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        run: flutter pub get
      - name: flutter analyze
        run: flutter analyze
      - name: flutter test
        run: flutter test
