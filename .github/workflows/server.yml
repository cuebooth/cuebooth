name: server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'

defaults:
  run:
    working-directory: server

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: server/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build (native)
        run: go build ./...
      - name: go test
        run: go test ./...

  cross-build-windows:
    name: cross-build (windows/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: server/go.sum
      - name: go build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build ./...
