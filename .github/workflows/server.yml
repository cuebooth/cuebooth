name: server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'

# Least privilege: these are pure build/test jobs.
permissions:
  contents: read

# Cancel superseded runs on the same ref — but only for PRs, so back-to-back
# pushes to main each keep their own CI record.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: server

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build (native)
        run: go build ./...
      - name: go test
        # -race guards the concurrent server (WebSocket hub, state store, poller).
        # The Linux runner has a C toolchain, so the race detector's cgo
        # requirement is satisfied.
        run: go test -race ./...

  cross-build-windows:
    name: cross-build (windows/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - name: go build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build ./...
