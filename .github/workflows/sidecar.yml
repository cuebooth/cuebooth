name: sidecar

on:
  push:
    branches: [main]
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar.yml'
  pull_request:
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar.yml'

# Least privilege: this is a pure build job.
permissions:
  contents: read

# Cancel superseded runs on the same ref — but only for PRs, so back-to-back
# pushes to main each keep their own CI record.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: sidecar

jobs:
  build:
    name: build (windows)
    # The sidecar's TargetFramework is net*-windows because Office COM
    # interop is Windows-only. Build on a Windows runner so the toolchain
    # is consistent with how the binary will ultimately ship.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: dotnet restore
        run: dotnet restore PptMonitor.csproj
      - name: dotnet build
        run: dotnet build PptMonitor.csproj --configuration Release --no-restore
